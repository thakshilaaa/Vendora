<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendora | Forget Password</title>

  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/typography.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/buttons.css}">
  <link rel="stylesheet" th:href="@{/css/cards.css}">
  <link rel="stylesheet" th:href="@{/css/forms.css}">
  <link rel="stylesheet" th:href="@{/css/utils.css}">

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&family=Playfair+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body.form-bg {
      background-image: url('/images/b2.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      background-size: cover;
    }
  </style>
</head>

<body class="form-bg">
<div class="page-wrapper">
<section class="form-container">
  <h1 class="section-title">Forget Password</h1>

  <form class="card" id="forgotPasswordForm">
    <p>Enter your email, and we&apos;ll send a code to reset your password.</p>
    <label for="email">Email Address</label>
    <input id="email" type="email" name="email" placeholder="example@email.com" required>
    <label for="phone" class="font-small">Phone (required if this email is used by more than one account)</label>
    <input id="phone" type="tel" name="phone" placeholder="Optional" autocomplete="tel">
    <button type="submit" class="btn-primary">Send Reset Link</button>

    <div class="text-center-mt">
      <a th:href="@{/login}" class="link-small">Back to Login</a>
    </div>
  </form>

  <p id="statusMessage" class="form-status"></p>
</section>

<script>
  document.getElementById("forgotPasswordForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const statusEl = document.getElementById("statusMessage");
    const body = { email };
    if (phone) body.phone = phone;
    try {
      const response = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const result = await response.json();
      statusEl.textContent = result.message || "If an account exists, reset instructions were sent.";
      statusEl.style.color = response.ok ? "green" : "red";
      statusEl.style.display = "block";
    } catch (err) {
      statusEl.textContent = "Network error. Please try again later.";
      statusEl.style.color = "red";
      statusEl.style.display = "block";
    }
  });
</script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/form.js}"></script>
</div>
</body>
</html>
