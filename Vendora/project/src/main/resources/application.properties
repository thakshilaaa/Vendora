# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/vendora?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Sharki@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONNECTION POOL (HikariCP)
# ===============================
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong
jwt.expiration=86400000
jwt.expiration-ms=86400000

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Optional: copy application-local.properties.example to src/main/resources/application-local.properties (gitignored)
spring.config.import=optional:classpath:application-local.properties
# ===============================
# MAIL — Gmail SMTP (use App Password, not your normal Gmail password)
# https://support.google.com/accounts/answer/185833
# Set env: MAIL_USERNAME / MAIL_PASSWORD or copy application-local.properties.example
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.default-encoding=UTF-8
# Troubleshooting: logging.level.jakarta.mail=DEBUG
# ===============================
# Dev only: POST /api/dev/mail/test with {"to":"x@y.com"} — set to true to enable
# ===============================
app.mail.test-endpoint=false
logging.level.com.vendora.epic1.service.impl.EmailServiceImpl=INFO
logging.level.org.springframework.mail=WARN

# ===============================
# CORS CONFIGURATION
# ===============================
app.cors.allowed-origins=*

# ===============================
# APPLICATION CONFIGURATION
# ===============================
app.base-url=http://localhost:8080