<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${editing} ? 'Edit product' : 'Add product'">Product form</title>
    <link rel="stylesheet" th:href="@{/css/animations.css}">
    <link rel="stylesheet" th:href="@{/css/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/cards.css}">
    <link rel="stylesheet" th:href="@{/css/ecommerce.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/media.css}">
    <link rel="stylesheet" th:href="@{/css/misc.css}">
    <link rel="stylesheet" th:href="@{/css/tables.css}">
    <link rel="stylesheet" th:href="@{/css/typography.css}">
    <link rel="stylesheet" th:href="@{/css/utils.css}">
</head>
<body>
<header class="topbar">
    <a th:href="@{/supplier/dashboard}" class="btn btn-secondary btn-sm">← Back to dashboard</a>
</header>
<main class="page">
    <div class="container narrow">
        <section class="page-header">
            <h1 class="page-title" th:text="${editing} ? 'Edit product' : 'Add a new product'">Add product</h1>
        </section>
        <form th:action="@{/supplier/product/save}" th:object="${form}" method="post" enctype="multipart/form-data" class="card">
            <input type="hidden" th:field="*{id}" th:if="${editing}"/>
            <div class="field">
                <label>Product name</label>
                <input type="text" th:field="*{name}" />
                <p class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>
            <div class="form-row">
                <div class="field">
                    <label>Category</label>
                    <select th:field="*{category}" required>
                        <option value="">Choose…</option>
                        <option th:each="c : ${categories}" th:value="${c.name()}" th:text="${c.name()}">SKINCARE</option>
                    </select>
                    <p class="error-message" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>
                </div>
                <div class="field">
                    <label>Price (LKR)</label>
                    <input type="number" step="0.01" th:field="*{price}" />
                    <p class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p>
                </div>
            </div>
            <div class="field">
                <label>Stock quantity</label>
                <input type="number" min="0" th:field="*{stockQuantity}" />
                <p class="error-message" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></p>
            </div>
            <div class="field">
                <label>Description</label>
                <textarea th:field="*{description}" rows="4"></textarea>
            </div>
            <div class="field">
                <label>Product image</label>
                <input type="file" name="image" accept="image/*" />
                <div th:if="${form.existingImagePath != null}" class="field">
                    <p class="text-small text-muted">Current image:</p>
                    <img th:src="${form.existingImagePath}" class="img-cover img-thumb" />
                </div>
            </div>
            <div class="flex-gap-sm justify-end">
                <a th:href="@{/supplier/dashboard}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" th:text="${editing} ? 'Save changes' : 'Add product'">Save</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
