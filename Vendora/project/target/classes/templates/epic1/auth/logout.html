<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora | Logging Out...</title>

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/typography.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/cards.css}">
    <link rel="stylesheet" th:href="@{/css/utils.css}">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body.form-bg {
            background-image: url('/images/b2.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
        }

        .logout-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d4a373;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="form-bg">
<div class="page-wrapper">
<div class="logout-container">
    <div class="card card-sm">
        <div class="loader loader-center"></div>
        <h1 class="section-title section-title-sm">Logging Out</h1>
        <p class="text-gray">Safely clearing your session. Please wait a moment...</p>
    </div>

<script th:inline="javascript">
    const loginPath = /*[[@{/login}]]*/ "/login";
    window.onload = function() {
        localStorage.removeItem("vendoraToken");
        localStorage.removeItem("token");
        localStorage.removeItem("vendoraUser");
        sessionStorage.clear();
        document.cookie = "vendoraToken=;path=/;max-age=0";
        setTimeout(function() { window.location.href = loginPath; }, 800);
    };
</script>
<script th:src="@{/js/main.js}"></script>
</div>
</div>
</body>
</html>
