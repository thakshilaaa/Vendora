<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendora | Update Password</title>

  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/typography.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/buttons.css}">
  <link rel="stylesheet" th:href="@{/css/cards.css}">
  <link rel="stylesheet" th:href="@{/css/forms.css}">
  <link rel="stylesheet" th:href="@{/css/utils.css}">

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&family=Playfair+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body.form-bg {
      background-image: url('/images/b2.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      background-size: cover;
    }
  </style>
</head>

<body class="form-bg">
<div class="page-wrapper">
<section class="form-container">
  <h1 class="section-title">Change Password</h1>
  <p class="text-center-desc">Protect your account with a strong password.</p>

  <form class="card" id="updatePasswordForm">
    <label for="currentPassword">Current Password</label>
    <input type="password" id="currentPassword" name="currentPassword"
           placeholder="Enter current password" required>

    <label for="newPassword">New Password</label>
    <input type="password" id="newPassword" name="password"
           placeholder="Min. 8 characters" required
           pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}"
           title="Must include uppercase, lowercase, number, and special character">

    <label for="confirmNewPassword">Confirm New Password</label>
    <input type="password" id="confirmNewPassword" name="confirmPassword"
           placeholder="Re-enter new password" required>

    <button type="submit" class="btn-primary">Update Password</button>

    <div class="text-center-mt">
      <a th:href="@{/profile}" class="btn-link">Cancel and Return</a>
    </div>
  </form>

  <p id="errorMessage" class="error-message"></p>
</section>

<script th:inline="javascript">
  const loginUrl = /*[[@{/login}]]*/ '/login';

  function getAuthToken() {
    return localStorage.getItem('token') || localStorage.getItem('vendoraToken');
  }

  document.getElementById('updatePasswordForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const currentPass = document.getElementById('currentPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmNewPassword').value;
    const errorEl = document.getElementById('errorMessage');
    errorEl.style.display = 'none';

    if (newPass !== confirmPass) {
      showError('New passwords do not match.');
      return;
    }
    if (newPass === currentPass) {
      showError('New password cannot be the same as your current password.');
      return;
    }
    const token = getAuthToken();
    if (!token) {
      showError('Please log in first.');
      return;
    }
    try {
      const response = await fetch('/api/auth/change-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ currentPassword: currentPass, newPassword: newPass })
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) {
        showError(result.message || 'Could not update password.');
        return;
      }
      localStorage.removeItem('token');
      localStorage.removeItem('vendoraToken');
      alert(result.message || 'Password updated. Please sign in again.');
      window.location.href = loginUrl;
    } catch {
      showError('Network error. Try again.');
    }
  });

  function showError(message) {
    const errorEl = document.getElementById('errorMessage');
    errorEl.textContent = message;
    errorEl.style.display = 'block';
  }
</script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/form.js}"></script>
</div>
</body>
</html>
