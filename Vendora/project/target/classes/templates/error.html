<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — Vendora</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/buttons.css}">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .error-card { max-width: 32rem; background: rgba(255,255,255,0.95); padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .error-card h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
    .error-card p { margin: 0.35rem 0; color: #444; }
    .actions { margin-top: 1.25rem; display: flex; flex-wrap: wrap; gap: 0.75rem; }
  </style>
</head>
<body>
  <div class="error-card">
    <h1>Something went wrong</h1>
    <p th:if="${status != null}"><strong>Status:</strong> <span th:text="${status}">500</span></p>
    <p th:if="${error != null}"><strong>Type:</strong> <span th:text="${error}">Error</span></p>
    <p th:if="${message != null}"><strong>Details:</strong> <span th:text="${message}">—</span></p>
    <p th:if="${path != null}"><strong>Path:</strong> <span th:text="${path}">/</span></p>
    <div class="actions">
      <a class="btn-primary" th:href="@{/customer-dashboard}">Customer home</a>
      <a class="btn-secondary" th:href="@{/admin-login}">Admin login</a>
    </div>
  </div>
</body>
</html>
