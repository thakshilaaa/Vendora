# In-memory DB for automated tests (no MySQL required for mvn test)
spring.datasource.url=jdbc:h2:mem:vendora_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Avoid needing a real mail server in tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# JWT (must be long enough for the app's JwtService)
jwt.secret=testSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForH2TestsOnly
jwt.expiration=86400000
jwt.expiration-ms=86400000

app.base-url=http://localhost:8080
app.cors.allowed-origins=*

server.port=0
